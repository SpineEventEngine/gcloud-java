name: Gradle Wrapper validation
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  validation:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4
