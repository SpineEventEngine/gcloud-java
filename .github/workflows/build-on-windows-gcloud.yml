name: Windows CI (gcloud-java)

on: pull_request

jobs:
  build:
    runs-on: windows-latest
    name: Build on Windows

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: zulu

      - uses: gradle/actions/setup-gradle@v6

      # See: https://github.com/al-cheb/configure-pagefile-action
      - name: Configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.3

      # The Datastore Emulator runs in a Linux Docker container via Testcontainers.
      # GitHub-hosted Windows runners cannot launch Linux containers, so the emulator-backed
      # suites of `:datastore` and `:testutil-gcloud` are excluded here and run on the Ubuntu
      # runner instead. Windows developers run them locally with Docker Desktop (Linux
      # containers). This job remains a compilation check plus the non-Docker test suites.
      - name: Build project and run tests
        shell: cmd
        run: gradlew.bat build --stacktrace -x :datastore:test -x :testutil-gcloud:test

      # See: https://github.com/marketplace/actions/junit-report-action
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4.0.3
        if: always() # always run even if the previous step fails
        with:
          report_paths: '**/build/test-results/**/TEST-*.xml'
          require_tests: true
